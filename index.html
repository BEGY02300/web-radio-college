<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Web Radio Collège - Podcasts et reportages" />
  <meta name="color-scheme" content="dark light" />

  <!-- Content Security Policy -->
  <!-- Domaines autorisés :
       - CDN assets (Tailwind, jsDelivr, esm.sh) pour scripts/styles/fonts
       - api.github.com + raw.githubusercontent.com pour l'API et téléchargement
       - *.supabase.co pour la base de commentaires
       - *.googleapis.com + www.gstatic.com + www.google.com pour Firebase Phone Auth + reCAPTCHA
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdn.tailwindcss.com https://esm.sh https://unpkg.com https://www.gstatic.com https://www.google.com https://apis.google.com https://*.firebaseapp.com https://*.googleapis.com;
    style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net data:;
    img-src 'self' https: data:;
    media-src 'self' https://raw.githubusercontent.com https://*.githubusercontent.com https://github.com blob:;
    connect-src 'self' https://api.github.com https://raw.githubusercontent.com https://*.githubusercontent.com https://*.supabase.co wss://*.supabase.co https://*.firebaseio.com https://*.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com;
    frame-src https://*.firebaseapp.com https://www.google.com https://recaptcha.google.com;
    object-src 'none';
    base-uri 'self';
  " />

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Web Radio Collège</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50: '#eef5ff', 100: '#d9e7ff', 500: '#3b82f6',
              600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">

  <style>
    html, body { font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.4); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.7); }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform:translateY(0);} }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    .media-card { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
    .media-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3); }
    .spinner { border: 3px solid rgba(59,130,246,0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen">
  <div id="root">
    <div class="min-h-screen flex items-center justify-center">
      <div class="text-center">
        <div class="spinner w-12 h-12 mx-auto mb-4"></div>
        <p class="text-slate-500">Chargement de Web Radio Collège...</p>
      </div>
    </div>
  </div>

  <!-- Variables d'environnement (clés API) -->
  <script src="./env.js"></script>

  <!-- Import map -->
  <script type="importmap">
  {
    "imports": {
      "react":             "https://esm.sh/react@18.3.1",
      "react-dom/client":  "https://esm.sh/react-dom@18.3.1/client",
      "htm":               "https://esm.sh/htm@3.1.1"
    }
  }
  </script>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
